/**:
  ros__parameters:
    # Sampling range (base_link frame)
    x_dist_min: -0.5
    x_dist_max: 4.0
    y_dist_min: -2.0
    y_dist_max: 2.0

    # Occupancy grid configuration
    grid_resolution: 0.05          # meters per cell
    grid_width: 162                # cells in x direction
    grid_height: 40                # cells in y direction
    grid_origin_x: -0.05           # origin x in base_link frame
    grid_origin_y: -1.0            # origin y in base_link frame
    inflation_radius: 0.40         # obstacle inflation radius (m)

    # RRT algorithm parameters
    max_iterations: 300            # max RRT iterations per cycle
    steer_step_size: 0.7           # max step size when steering
    collision_check_resolution: 0.05  # resolution for collision checking
    goal_tolerance: 0.3            # distance to goal before considering reached
    max_goal_distance: 4.0         # max distance to sample goal

    # Timing
    rrt_update_frequency_ms: 100   # RRT update frequency

    # Waypoint tracking
    waypoint_threshold: 2.0        # distance to switch waypoints
    min_dist_to_goal: 1.5          # minimum distance to maintain from goal